name: Daily Monitoring

"on":
  workflow_dispatch:        # 수동 실행

jobs:
  run-daily:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Install Playwright browsers
        run: python -m playwright install chromium

      - name: Create required directories
        run: |
          mkdir -p .auth .secrets \
            data/snapshots/supply \
            data/snapshots/ads \
            data/snapshots/policy \
            data/snapshots/apps

      - name: Restore Google service account
        env:
          SA_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
        run: printf '%s' "$SA_JSON" > .secrets/google_service_account.json

      - name: Verify credentials file
        run: |
          echo "[debug] credentials path: .secrets/google_service_account.json"
          echo "[debug] file exists: $(test -f .secrets/google_service_account.json && echo YES || echo NO)"
          echo "[debug] file size:   $(wc -c < .secrets/google_service_account.json) bytes"
          python - <<'EOF'
          import json, sys
          try:
              d = json.load(open(".secrets/google_service_account.json"))
              print("[debug] service_account_email:", d.get("client_email", "(missing)"))
              print("[debug] project_id:", d.get("project_id", "(missing)"))
          except Exception as e:
              print("[debug] parse error:", e, file=sys.stderr)
              sys.exit(1)
          EOF

      - name: Decrypt AirDNA session
        env:
          AIRDNA_PASSPHRASE: ${{ secrets.AIRDNA_STATE_PASSPHRASE }}
        run: |
          gpg --batch --yes --pinentry-mode loopback \
            --passphrase "$AIRDNA_PASSPHRASE" \
            --decrypt --output .auth/airdna_state.json \
            secrets/airdna_state.json.gpg

      - name: Run daily monitoring
        env:
          GOOGLE_SHEET_ID: ${{ secrets.GOOGLE_SHEET_ID }}
          GOOGLE_CHAT_WEBHOOK_URL: ${{ secrets.GOOGLE_CHAT_WEBHOOK_URL }}
          GOOGLE_APPLICATION_CREDENTIALS: .secrets/google_service_account.json
        run: python -m src.jobs.run_daily
